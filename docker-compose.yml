version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: deskill-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: deskill
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - deskill-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deskill-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/deskill?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_here_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      BSC_RPC_URL: https://data-seed-prebsc-1-s1.binance.org:8545/
      PRIVATE_KEY: your_private_key_without_0x_prefix
      CONTRACT_ADDRESS: deployed_contract_address_here
      OPENAI_API_KEY: your_openai_api_key_here
      AUTHORIZED_ISSUERS: 0x1234567890123456789012345678901234567890
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - deskill-network

  # Frontend Next.js App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deskill-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_CONTRACT_ADDRESS: deployed_contract_address_here
      NEXT_PUBLIC_BSC_RPC_URL: https://data-seed-prebsc-1-s1.binance.org:8545/
      NEXT_PUBLIC_BSC_CHAIN_ID: 97
      NEXT_PUBLIC_APP_NAME: DeSkill
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - deskill-network

volumes:
  mongodb_data:

networks:
  deskill-network:
    driver: bridge
